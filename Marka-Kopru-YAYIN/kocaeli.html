<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0a1628" />
  <meta name="description" content="Kocaeli Seni Dinliyorum — görüş, öneri, şikayet ve teşekkürleriniz tek platformda." />
  <title>Kocaeli Seni Dinliyorum</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Syne:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/kocaeli.css" />
</head>
<body class="k41-page">
  <div class="k41-bg" aria-hidden="true"></div>
  <header class="k41-top">
    <div class="k41-top__inner">
      <a class="k41-back" href="index.html">← Köprü</a>
      <div class="k41-brand">
        <span class="k41-brand__mark" aria-hidden="true"></span>
        <div>
          <p class="k41-brand__eyebrow">Topluluk modülü</p>
          <h1 class="k41-brand__title">Kocaeli Seni Dinliyorum</h1>
        </div>
      </div>
      <p class="k41-top__tagline">Kocaeli halkının sesi burada — öneri, talep, şikayet ve teşekkürlerinizi paylaşın.</p>
    </div>
  </header>

  <div class="k41-layout">
    <aside class="k41-side" aria-label="Filtreler ve gündem">
      <section class="k41-card k41-card--accent">
        <h2 class="k41-card__h">İlçe</h2>
        <div id="ilce-filters" class="k41-chips"></div>
      </section>
      <section class="k41-card">
        <h2 class="k41-card__h">Kategori</h2>
        <div id="cat-filters" class="k41-chips k41-chips--soft"></div>
      </section>
      <section class="k41-card">
        <h2 class="k41-card__h">En çok konuşulanlar</h2>
        <ol id="trending-list" class="k41-trend"></ol>
        <p id="trending-empty" class="k41-muted" hidden>Henüz özet yok.</p>
      </section>
    </aside>

    <main class="k41-main">
      <section class="k41-compose k41-card" aria-labelledby="compose-h">
        <h2 id="compose-h" class="k41-card__h">Sesini duyur</h2>
        <form id="compose-form" class="k41-form">
          <div class="k41-form__row">
            <label class="k41-field">
              <span>İlçe</span>
              <select id="f-ilce" name="ilce" required></select>
            </label>
            <label class="k41-field">
              <span>Kategori</span>
              <select id="f-cat" name="category" required></select>
            </label>
          </div>
          <label class="k41-field">
            <span>Başlık <span class="k41-optional">(isteğe bağlı)</span></span>
            <input id="f-title" name="title" type="text" maxlength="200" placeholder="Kısa bir başlık" />
          </label>
          <label class="k41-field">
            <span>Mesajın</span>
            <textarea id="f-body" name="body" required minlength="8" maxlength="8000" rows="5" placeholder="Görüşünü, önerini veya talebini açık ve saygılı şekilde yaz…"></textarea>
          </label>
          <label class="k41-field k41-field--file">
            <span>Fotoğraf <span class="k41-optional">(isteğe bağlı, en fazla ~400 KB)</span></span>
            <input id="f-photo" name="photo" type="file" accept="image/jpeg,image/png,image/webp" />
            <div id="f-photo-preview" class="k41-photo-preview" hidden></div>
          </label>
          <label class="k41-check">
            <input id="f-anon" type="checkbox" checked />
            <span>Anonim paylaş <small class="k41-muted">(isimle paylaşmak için işareti kaldırın ve giriş yapın)</small></span>
          </label>
          <p id="compose-msg" class="k41-msg" role="status"></p>
          <button type="submit" class="k41-btn k41-btn--primary">Gönderiyi yayınla</button>
        </form>
      </section>

      <section class="k41-feed-head">
        <h2 class="k41-feed-head__h">Akış</h2>
        <div class="k41-sort">
          <button type="button" class="k41-pill is-on" data-sort="new">Yeniler</button>
          <button type="button" class="k41-pill" data-sort="trending">Öne çıkanlar</button>
        </div>
      </section>
      <div id="feed" class="k41-feed" aria-live="polite"></div>
      <p id="feed-empty" class="k41-muted k41-center" hidden>Bu filtrede henüz gönderi yok. İlk sen yaz.</p>
    </main>
  </div>

  <dialog id="dlg-thread" class="k41-dialog">
    <div class="k41-dialog__inner">
      <button type="button" class="k41-dialog__x" id="dlg-close" aria-label="Kapat">×</button>
      <div id="dlg-post"></div>
      <h3 class="k41-dialog__h">Yorumlar</h3>
      <ul id="dlg-comments" class="k41-comment-list"></ul>
      <form id="dlg-comment-form" class="k41-form k41-form--tight">
        <label class="k41-field">
          <span>Yorum</span>
          <textarea id="dlg-comment-body" required minlength="2" maxlength="2000" rows="3"></textarea>
        </label>
        <label class="k41-field" id="dlg-anon-wrap">
          <span>Görünen ad (anonim)</span>
          <input id="dlg-anon-label" type="text" maxlength="40" placeholder="ör. İzmitli_41" />
        </label>
        <button type="submit" class="k41-btn k41-btn--secondary">Yorum gönder</button>
      </form>
    </div>
  </dialog>

  <dialog id="dlg-report" class="k41-dialog k41-dialog--sm">
    <form id="report-form" class="k41-dialog__inner">
      <h3 class="k41-dialog__h">Bildir</h3>
      <input type="hidden" id="rep-type" />
      <input type="hidden" id="rep-id" />
      <label class="k41-field">
        <span>Sebep</span>
        <textarea id="rep-reason" required minlength="4" maxlength="500" rows="4"></textarea>
      </label>
      <div class="k41-dialog__actions">
        <button type="button" class="k41-btn k41-btn--ghost" id="rep-cancel">Vazgeç</button>
        <button type="submit" class="k41-btn k41-btn--primary">Gönder</button>
      </div>
    </form>
  </dialog>

  <script src="js/kocaeli-page.js"></script>
</body>
</html>
