<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Şifre sıfırlama</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 420px; margin: 2rem auto; padding: 0 1rem; line-height: 1.5; color: #0f172a; }
    h1 { font-size: 1.25rem; }
    label { display: block; margin-top: 1rem; font-weight: 600; font-size: 0.9rem; }
    input { width: 100%; padding: 0.6rem 0.75rem; margin-top: 0.35rem; font: inherit; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; }
    button { margin-top: 1.25rem; padding: 0.65rem 1.2rem; font: inherit; font-weight: 600; background: #1e90ff; color: #fff; border: none; border-radius: 8px; cursor: pointer; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    p.msg { min-height: 1.25rem; font-size: 0.9rem; margin-top: 0.75rem; }
    p.err { color: #b91c1c; }
    p.ok { color: #15803d; }
    a { color: #1e90ff; }
  </style>
</head>
<body>
  <p><a href="index.html">← Köprüye dön</a></p>
  <p id="gh-note" class="msg" style="display:none" role="status"></p>
  <h1>Yeni şifre belirle</h1>
  <p>E-postadaki bağlantıyla geldiniz. Yeni şifrenizi girin.</p>
  <form id="f">
    <label for="p1">Yeni şifre</label>
    <input id="p1" type="password" minlength="8" autocomplete="new-password" required />
    <label for="p2">Yeni şifre (tekrar)</label>
    <input id="p2" type="password" minlength="8" autocomplete="new-password" required />
    <button type="submit" id="btn">Şifreyi güncelle</button>
  </form>
  <p id="msg" class="msg" role="status"></p>
  <script>
    (function () {
      var msg = document.getElementById("msg");
      var btn = document.getElementById("btn");
      var ghn = document.getElementById("gh-note");
      if (/github\.io$/i.test(location.hostname) || /github\.io\./i.test(location.hostname)) {
        if (ghn) {
          ghn.textContent = "Statik (GitHub Pages) ortamda şifre API’si yok. Bu form tam sürüm sunucu ile çalışır.";
          ghn.style.display = "block";
          ghn.className = "msg err";
        }
        if (msg) {
          msg.textContent = "Bu sayfayı tam sürümde açmanız gerekir.";
          msg.className = "msg err";
        }
        if (btn) btn.disabled = true;
        var p1e = document.getElementById("p1");
        var p2e = document.getElementById("p2");
        if (p1e) p1e.disabled = true;
        if (p2e) p2e.disabled = true;
        return;
      }
      var q = new URLSearchParams(location.search);
      var token = q.get("reset") || q.get("token") || "";
      if (!token) {
        msg.textContent = "Bağlantıda sıfırlama kodu yok. E-postadaki linki kullanın.";
        msg.className = "msg err";
        btn.disabled = true;
        return;
      }
      document.getElementById("f").addEventListener("submit", function (ev) {
        ev.preventDefault();
        var p1 = document.getElementById("p1").value;
        var p2 = document.getElementById("p2").value;
        if (p1 !== p2) {
          msg.textContent = "Şifreler eşleşmiyor.";
          msg.className = "msg err";
          return;
        }
        btn.disabled = true;
        msg.textContent = "Gönderiliyor…";
        msg.className = "msg";
        fetch("/api/v1/auth/reset-password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token: token, newPassword: p1 }),
        })
          .then(function (r) {
            return r.json().then(function (j) {
              if (!r.ok) throw new Error(j.message || j.error || "İstek başarısız");
              msg.textContent = j.message || "Şifre güncellendi.";
              msg.className = "msg ok";
            });
          })
          .catch(function (e) {
            msg.textContent = String(e.message || e);
            msg.className = "msg err";
            btn.disabled = false;
          });
      });
    })();
  </script>
</body>
</html>
